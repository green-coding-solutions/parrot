services:
  window-container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: window-container
    ports:
      - "6080:6080" # noVNC (open in browser)
      - "5900:5900" # raw VNC
    volumes:
      - ./recordings:/recordings
    environment:
      DISPLAY: ":99"
      SCREEN_SIZE: "1440x900x24"
      APP_STARTCOMMAND: "firefox https://browserbench.org/Speedometer3.1/ --no-default-browser-check"
      APP_LOG_FILE: "/tmp/firefox.log"
      APP_WINDOW_CLASS: "firefox"
      APP_WINDOW_TITLE: "Firefox"
      AUTO_POSITION: "1"
      WINDOW_X: "20"
      WINDOW_Y: "20"
      WINDOW_WIDTH: "1400"
      WINDOW_HEIGHT: "860"
    restart: "no"
